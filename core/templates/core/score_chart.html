{% extends 'core/base.html' %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2 class="mb-3">Gráfico de Pontuação</h2>
        <p class="text-muted">Clique no nome de um usuário na legenda para exibir ou ocultar sua curva no gráfico.</p>
        <div class="card shadow-sm">
            <div class="card-body" style="position: relative; height: 500px; width: 100%;">
                <canvas id="scoreChart"></canvas>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const ctx = document.getElementById('scoreChart').getContext('2d');
        const chartData = JSON.parse('{{ chart_data_json|escapejs }}');

        new Chart(ctx, {
            type: 'line',
            data: chartData,
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        callbacks: {
                            label: function (context) {
                                let label = context.dataset.label || '';
                                if (label) {
                                    label += ': ';
                                }
                                if (context.parsed.y !== null) {
                                    label += context.parsed.y + ' pts';
                                }
                                return label;
                            }
                        }
                    },
                    legend: {
                        position: 'top',
                        labels: {
                            usePointStyle: true,
                            padding: 20
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: 'Pontuação Acumulada'
                        }
                    },
                    x: {
                        title: {
                            display: true,
                            text: 'Rodadas'
                        }
                    }
                },
                interaction: {
                    mode: 'nearest',
                    axis: 'x',
                    intersect: false
                }
            }
        });
    });
</script>
{% endblock %}
